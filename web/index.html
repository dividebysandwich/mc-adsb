<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mc-adsb live traffic</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
  #adsb-root { position: relative; width: 100%; height: 100%; }
  #adsb-map { width: 100%; height: 100%; background: #0b1320; }
  .adsb-status {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: rgba(15,23,42,.85); color: #e2e8f0;
    padding: 6px 10px; border-radius: 6px; font-size: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .adsb-status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #f87171; margin-right: 6px; vertical-align: middle; }
  .adsb-status.connected .dot { background: #4ade80; }
  .adsb-plane {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    transform-origin: 50% 50%;
  }
  .adsb-plane svg { width: 32px; height: 32px; display: block;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
  .adsb-label {
    background: rgba(15,23,42,.85); color: #f1f5f9;
    padding: 2px 5px; border-radius: 3px; font-size: 11px;
    border: none; box-shadow: none; white-space: nowrap;
  }
  .leaflet-tooltip-top.adsb-label::before { display: none; }
  /* Alerted aircraft: flash white-on-red 2 Hz (toggled by JS every 250 ms). */
  .adsb-label.alert-on {
    background: #dc2626 !important;
    color: #ffffff !important;
  }
</style>
</head>
<body>
<div id="adsb-root">
  <div id="adsb-map"></div>
  <div id="adsb-status" class="adsb-status"><span class="dot"></span><span id="adsb-status-text">connecting…</span></div>
</div>
<script>
(function () {
  const root = document.getElementById('adsb-root');
  const statusEl = document.getElementById('adsb-status');
  const statusText = document.getElementById('adsb-status-text');

  const scriptOrigin = window.location.origin;
  const basePath = '/adsb';
  const wsProto = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = wsProto + '://' + window.location.host + basePath + '/ws';

  const map = L.map('adsb-map', {
    zoomControl: true,
    worldCopyJump: true,
  }).setView([48.2082, 16.3738], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO &middot; data &copy; adsb.lol',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  let centerMarker = null;
  let radiusCircle = null;
  let restrictedCircle = null;
  let restrictedCenter = null; // [lat, lon] — endpoint for alert lines
  const markers = new Map(); // hex -> { marker, lastSeen, lastLat, lastLon, history: [], alert, alertLine }
  const alertedIds = new Set();
  const STALE_MS = 15000;
  const HISTORY_LEN = 10;

  function removeEntry(entry) {
    map.removeLayer(entry.marker);
    for (const dot of entry.history) map.removeLayer(dot);
    if (entry.alertLine) { map.removeLayer(entry.alertLine); entry.alertLine = null; }
  }

  function pruneStale() {
    const now = Date.now();
    for (const [id, entry] of markers) {
      if (now - entry.lastSeen > STALE_MS) {
        removeEntry(entry);
        markers.delete(id);
        alertedIds.delete(id);
      }
    }
  }
  setInterval(pruneStale, 1000);

  // 2 Hz flash: toggle the `alert-on` class on every alerted aircraft's label
  // every 250 ms (one on/off cycle every 500 ms = 2 Hz).
  let alertFlashOn = false;
  setInterval(function () {
    alertFlashOn = !alertFlashOn;
    for (const id of alertedIds) {
      const entry = markers.get(id);
      if (!entry) continue;
      const tip = entry.marker.getTooltip && entry.marker.getTooltip();
      const el = tip && tip.getElement && tip.getElement();
      if (!el) continue;
      if (alertFlashOn) el.classList.add('alert-on');
      else el.classList.remove('alert-on');
    }
  }, 250);

  function pushHistory(entry, lat, lon) {
    const dot = L.circleMarker([lat, lon], {
      radius: 2.5,
      stroke: false,
      fillColor: '#ffffff',
      fillOpacity: 0.85,
      interactive: false,
      pane: 'overlayPane',
    }).addTo(map);
    entry.history.push(dot);
    while (entry.history.length > HISTORY_LEN) {
      map.removeLayer(entry.history.shift());
    }
  }

  // Heli ICAO type designators — used when an aircraft doesn't transmit category A7.
  const HELI_TYPES = new Set(['EC20','EC25','EC30','EC35','EC45','EC55','EC75','EC20T','EC30T',
    'AS32','AS35','AS50','AS55','AS65','AS3B','A109','A119','A139','A149','A169','A189',
    'B06','B06T','B105','B212','B214','B222','B230','B407','B412','B427','B429','B430','B47G',
    'B505','B47J','BK17','EH10','H160','H175','H47','H500','H60','H64',
    'R22','R44','R66','S330','S55T','S58T','S61','S64','S76','S92','UH1',
    'PUMA','LYNX','TIGR','EXPL','GAZL','HUCO','NH90','SYCA','WASP','WESX','WG30','S70',
    'MI2','MI8','MI17','MI24','MI26','MI28','MI34','KA26','KA32','KA50','KA52','KA62',
    'A129','EH101','LAMA','ALO2','ALO3','DJIN','BSTP','EXEC','ENST','HUSK','SCHW']);

  // Common glider/sailplane ICAO type designators (DG, ASK, Discus, Duo Discus, Janus, Nimbus,
  // Ventus, LS-series, ASW, ASH, Schweizer trainers, motor-gliders, etc.).
  const GLIDER_TYPES = new Set(['AS21','AS22','AS24','AS25','AS28','AS29','AS33',
    'ASK13','ASK14','ASK18','ASK21','AS21','DG1T','DG40','DG50','DG80','DG10','DG30','DG60',
    'DISC','DUOD','JANS','NIMB','VENT','LS3','LS4','LS6','LS7','LS8','LS9','LS10','ASW','ASH',
    'STD','STDC','SF25','SF34','SF36','SZD','PUC','PER','PHO','TWIN','ARCU','BLNK','PIPR',
    'PIK20','PIK30','PW5','PW6','SZ4','SZD9','G103','G102','G104','SZD55','SZD51']);

  function craftKind(ac) {
    if (!ac) return 'plane';
    const cat = typeof ac.category === 'string' ? ac.category.toUpperCase() : '';
    const t = typeof ac.t === 'string' ? ac.t.toUpperCase() : '';

    // Towers/obstacles report as type "TWR" with no category, or as C3/C4/C5.
    if (t === 'TWR' || cat === 'C3' || cat === 'C4' || cat === 'C5') return 'tower';
    // Surface vehicles: emergency or service.
    if (cat === 'C1' || cat === 'C2') return 'vehicle';
    // Rotorcraft.
    if (cat === 'A7' || HELI_TYPES.has(t)) return 'heli';
    // Glider / sailplane.
    if (cat === 'B1' || GLIDER_TYPES.has(t)) return 'glider';
    // Drone / UAV.
    if (cat === 'B6') return 'drone';
    // Light aircraft (single-engine props, trainers).
    if (cat === 'A1' || cat === 'A2') return 'light';
    return 'plane';
  }

  // All SVGs are 32x32 and drawn nose-up so CSS rotation maps directly to track.
  const SVG_OPEN = '<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">';
  const SVG_CLOSE = '</svg>';
  const STROKE = 'stroke="#1e293b" stroke-width="1" stroke-linejoin="round"';

  // Airliner: swept wings, long fuselage.
  const PLANE_SVG = SVG_OPEN +
    '<path d="M16 1.5 C 17.2 1.5 17.9 3 17.9 5.2 L 17.9 11.5 L 30 18.2 L 30 20.4 ' +
            'L 17.9 17.2 L 17.9 24.6 L 22 27.2 L 22 28.6 L 16 27.3 L 10 28.6 L 10 27.2 ' +
            'L 14.1 24.6 L 14.1 17.2 L 2 20.4 L 2 18.2 L 14.1 11.5 L 14.1 5.2 ' +
            'C 14.1 3 14.8 1.5 16 1.5 Z" fill="#fbbf24" ' + STROKE + '/>' + SVG_CLOSE;

  // Light aircraft: straighter wings, smaller, a touch greener so it stands out from airliners.
  const LIGHT_SVG = SVG_OPEN +
    '<path d="M16 4 C 16.9 4 17.4 5 17.4 6.5 L 17.4 12.5 L 27 14 L 27 16 L 17.4 15.5 ' +
            'L 17.4 23.5 L 20.5 26 L 20.5 27 L 16 26.2 L 11.5 27 L 11.5 26 L 14.6 23.5 ' +
            'L 14.6 15.5 L 5 16 L 5 14 L 14.6 12.5 L 14.6 6.5 C 14.6 5 15.1 4 16 4 Z" ' +
            'fill="#86efac" ' + STROKE + '/>' + SVG_CLOSE;

  // Glider: long thin straight wings, very thin fuselage, T-tail.
  const GLIDER_SVG = SVG_OPEN +
    // wings (very wide, very thin)
    '<rect x="1" y="14.2" width="30" height="2.2" rx="1" fill="#f1f5f9" ' + STROKE + '/>' +
    // fuselage (thin)
    '<path d="M16 2 C 16.7 2 17.1 3 17.1 4.5 L 17.1 26 L 18.6 27.5 L 18.6 28.5 ' +
            'L 13.4 28.5 L 13.4 27.5 L 14.9 26 L 14.9 4.5 C 14.9 3 15.3 2 16 2 Z" ' +
            'fill="#f1f5f9" ' + STROKE + '/>' +
    // horizontal stabilizer (T-tail)
    '<rect x="9.5" y="25.2" width="13" height="1.6" rx="0.6" fill="#f1f5f9" ' + STROKE + '/>' +
    SVG_CLOSE;

  // Helicopter: rotor disc + crossed blades + small fuselage.
  const HELI_SVG = SVG_OPEN +
    '<circle cx="16" cy="14" r="13" fill="#38bdf8" fill-opacity="0.18" ' +
            'stroke="#38bdf8" stroke-opacity="0.6" stroke-width="0.8"/>' +
    '<line x1="3" y1="14" x2="29" y2="14" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>' +
    '<line x1="16" y1="1.5" x2="16" y2="26.5" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round"/>' +
    '<path d="M16 8 C 19.2 8 20.6 10.5 20.6 13 C 20.6 15.5 19.2 17.4 16.9 17.8 L 16.9 27 ' +
            'L 18.4 29 L 18.4 30 L 13.6 30 L 13.6 29 L 15.1 27 L 15.1 17.8 ' +
            'C 12.8 17.4 11.4 15.5 11.4 13 C 11.4 10.5 12.8 8 16 8 Z" ' +
            'fill="#fbbf24" ' + STROKE + '/>' +
    SVG_CLOSE;

  // Drone / UAV: small quadcopter — 4 rotor circles around a square body.
  const DRONE_SVG = SVG_OPEN +
    // arms (X)
    '<line x1="7" y1="7" x2="25" y2="25" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>' +
    '<line x1="25" y1="7" x2="7" y2="25" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>' +
    // rotors
    '<circle cx="7" cy="7" r="4" fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1"/>' +
    '<circle cx="25" cy="7" r="4" fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1"/>' +
    '<circle cx="7" cy="25" r="4" fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1"/>' +
    '<circle cx="25" cy="25" r="4" fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1"/>' +
    // body
    '<rect x="12" y="12" width="8" height="8" rx="1.5" fill="#0e7490" ' + STROKE + '/>' +
    SVG_CLOSE;

  // Ground vehicle: rounded rectangle, viewed from above.
  const VEHICLE_SVG = SVG_OPEN +
    '<rect x="10" y="6" width="12" height="20" rx="3" fill="#94a3b8" ' + STROKE + '/>' +
    // windshield hint
    '<rect x="11.5" y="8" width="9" height="4" rx="1" fill="#1e293b" fill-opacity="0.4"/>' +
    SVG_CLOSE;

  // Tower / fixed obstacle: warning triangle.
  const TOWER_SVG = SVG_OPEN +
    '<path d="M16 4 L 28 26 L 4 26 Z" fill="#ef4444" ' + STROKE + '/>' +
    '<rect x="15.2" y="11" width="1.6" height="9" fill="#0f172a"/>' +
    '<circle cx="16" cy="22.5" r="1.2" fill="#0f172a"/>' +
    SVG_CLOSE;

  const ICON_DEFS = {
    plane:   { svg: PLANE_SVG,   rotate: true,  cls: 'adsb-plane-icon' },
    light:   { svg: LIGHT_SVG,   rotate: true,  cls: 'adsb-light-icon' },
    glider:  { svg: GLIDER_SVG,  rotate: true,  cls: 'adsb-glider-icon' },
    heli:    { svg: HELI_SVG,    rotate: true,  cls: 'adsb-heli-icon' },
    drone:   { svg: DRONE_SVG,   rotate: false, cls: 'adsb-drone-icon' },
    vehicle: { svg: VEHICLE_SVG, rotate: true,  cls: 'adsb-vehicle-icon' },
    tower:   { svg: TOWER_SVG,   rotate: false, cls: 'adsb-tower-icon' },
  };

  function craftIcon(ac) {
    const def = ICON_DEFS[craftKind(ac)] || ICON_DEFS.plane;
    const rotation = (def.rotate && typeof ac.track === 'number') ? ac.track : 0;
    const html =
      '<div class="adsb-plane" style="transform: rotate(' + rotation + 'deg);">' +
        def.svg +
      '</div>';
    return L.divIcon({
      className: def.cls,
      html: html,
      iconSize: [32, 32],
      iconAnchor: [16, 16],
    });
  }

  function labelFor(ac) {
    const cs = (ac.flight || ac.r || ac.hex || '').toString().trim() || '???';
    const alt = (ac.alt_baro === 'ground') ? 'GND'
              : (typeof ac.alt_baro === 'number') ? (ac.alt_baro + 'ft')
              : (typeof ac.alt_geom === 'number') ? (ac.alt_geom + 'ft') : '';
    const gs = (typeof ac.gs === 'number') ? Math.round(ac.gs) + 'kt' : '';
    const parts = [cs, alt, gs].filter(Boolean);
    if (ac.mc_alert) {
      const a = ac.mc_alert;
      if (a.inside) {
        parts.push('INSIDE ' + Math.round(a.min_distance_m) + 'm');
      } else {
        parts.push('ETA ' + a.eta_s.toFixed(1) + 's @ ' + Math.round(a.min_distance_m) + 'm');
      }
    }
    return parts.join(' · ');
  }

  function popupFor(ac) {
    const rows = [
      ['Flight', ac.flight && ac.flight.trim()],
      ['Reg', ac.r],
      ['Type', ac.t],
      ['Hex', ac.hex],
      ['Alt (baro)', ac.alt_baro],
      ['Alt (geom)', ac.alt_geom],
      ['Speed', (typeof ac.gs === 'number') ? ac.gs.toFixed(0) + ' kt' : null],
      ['Track', (typeof ac.track === 'number') ? ac.track.toFixed(0) + '°' : null],
      ['V/S', (typeof ac.baro_rate === 'number') ? ac.baro_rate + ' fpm' : null],
      ['Squawk', ac.squawk],
      ['Category', ac.category],
    ].filter(r => r[1] !== undefined && r[1] !== null && r[1] !== '');
    return '<div style="font-family:system-ui;font-size:12px;min-width:160px">'
      + rows.map(r => '<div><b>' + r[0] + ':</b> ' + r[1] + '</div>').join('')
      + '</div>';
  }

  function setStatus(connected, text) {
    if (connected) statusEl.classList.add('connected');
    else statusEl.classList.remove('connected');
    statusText.textContent = text;
  }

  function applySnapshot(snap) {
    if (snap.center && centerMarker === null) {
      if (snap.radius_nm) {
        const bounds = L.latLng(snap.center.lat, snap.center.lon)
          .toBounds(snap.radius_nm * 1852 * 2);
        map.fitBounds(bounds, { padding: [20, 20] });
      } else {
        map.setView([snap.center.lat, snap.center.lon], map.getZoom());
      }
    }
    if (snap.center) {
      if (!centerMarker) {
        centerMarker = L.circleMarker([snap.center.lat, snap.center.lon], {
          radius: 3.5,
          color: '#ffffff',
          weight: 2,
          fillColor: '#2563eb',
          fillOpacity: 1,
          pane: 'markerPane',
        }).addTo(map);
        centerMarker.bindTooltip(
          'Center: ' + snap.center.lat.toFixed(4) + ', ' + snap.center.lon.toFixed(4),
          { direction: 'top', offset: [0, -8] }
        );
      } else {
        centerMarker.setLatLng([snap.center.lat, snap.center.lon]);
      }
      if (snap.radius_nm) {
        const meters = snap.radius_nm * 1852;
        if (!radiusCircle) {
          radiusCircle = L.circle([snap.center.lat, snap.center.lon], {
            radius: meters, color: '#38bdf8', weight: 1, fillOpacity: 0.04,
          }).addTo(map);
        } else {
          radiusCircle.setLatLng([snap.center.lat, snap.center.lon]);
          radiusCircle.setRadius(meters);
        }
      }
    }

    if (snap.restricted && typeof snap.restricted.radius_m === 'number') {
      const r = snap.restricted;
      restrictedCenter = [r.lat, r.lon];
      if (!restrictedCircle) {
        restrictedCircle = L.circle([r.lat, r.lon], {
          radius: r.radius_m,
          color: '#ef4444',
          weight: 2,
          fillColor: '#ef4444',
          fillOpacity: 0.12,
        }).addTo(map);
        restrictedCircle.bindTooltip(
          'Restricted: ' + r.radius_m + ' m radius, ≤ ' + r.altitude_ft + ' ft',
          { direction: 'top', sticky: true }
        );
      } else {
        restrictedCircle.setLatLng([r.lat, r.lon]);
        restrictedCircle.setRadius(r.radius_m);
      }
    }

    const now = Date.now();
    const seen = new Set();
    const list = snap.aircraft || [];
    for (const ac of list) {
      if (typeof ac.lat !== 'number' || typeof ac.lon !== 'number') continue;
      const id = ac.hex || ac.r || ac.flight;
      if (!id) continue;
      seen.add(id);

      let entry = markers.get(id);
      const latlng = [ac.lat, ac.lon];
      const icon = craftIcon(ac);
      if (!entry) {
        const marker = L.marker(latlng, { icon: icon, riseOnHover: true })
          .addTo(map)
          .bindTooltip(labelFor(ac), { permanent: true, direction: 'top', offset: [0, -16], className: 'adsb-label' })
          .bindPopup(popupFor(ac));
        entry = { marker: marker, lastSeen: now, lastLat: ac.lat, lastLon: ac.lon, history: [], alert: !!ac.mc_alert };
        markers.set(id, entry);
      } else {
        if (entry.lastLat !== ac.lat || entry.lastLon !== ac.lon) {
          pushHistory(entry, entry.lastLat, entry.lastLon);
          entry.lastLat = ac.lat;
          entry.lastLon = ac.lon;
        }
        entry.marker.setLatLng(latlng);
        entry.marker.setIcon(icon);
        entry.marker.setTooltipContent(labelFor(ac));
        if (entry.marker.isPopupOpen()) entry.marker.setPopupContent(popupFor(ac));
        entry.lastSeen = now;
        entry.alert = !!ac.mc_alert;
      }
      if (entry.alert) alertedIds.add(id);
      else alertedIds.delete(id);

      if (entry.alert && restrictedCenter) {
        const pts = [latlng, restrictedCenter];
        if (!entry.alertLine) {
          entry.alertLine = L.polyline(pts, {
            color: '#ef4444',
            weight: 2,
            opacity: 0.9,
            dashArray: '6 6',
            interactive: false,
          }).addTo(map);
        } else {
          entry.alertLine.setLatLngs(pts);
        }
      } else if (entry.alertLine) {
        map.removeLayer(entry.alertLine);
        entry.alertLine = null;
      }
    }

    pruneStale();

    setStatus(true, list.length + ' aircraft · ' + new Date().toLocaleTimeString());
  }

  let ws = null;
  let backoff = 1000;
  function connect() {
    setStatus(false, 'connecting…');
    try { ws = new WebSocket(wsUrl); } catch (e) { scheduleReconnect(); return; }
    ws.addEventListener('open', () => { backoff = 1000; setStatus(true, 'connected'); });
    ws.addEventListener('message', (ev) => {
      try { applySnapshot(JSON.parse(ev.data)); }
      catch (e) { console.error('bad message', e); }
    });
    ws.addEventListener('close', () => { setStatus(false, 'disconnected'); scheduleReconnect(); });
    ws.addEventListener('error', () => { try { ws.close(); } catch (_) {} });
  }
  function scheduleReconnect() {
    setTimeout(connect, backoff);
    backoff = Math.min(backoff * 2, 15000);
  }
  connect();
})();
</script>
</body>
</html>
